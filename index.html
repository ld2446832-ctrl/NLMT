<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Nhắc Gửi Tường</title>
    <style>
        body {
            background: linear-gradient(135deg, #1a1c29 0%, #2a2d42 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }
        .img-wrapper {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        h1 {
            color: #ffb703;
            font-size: 26px;
            margin: 25px 0;
            line-height: 1.5;
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.4);
        }
        .icon-row {
            font-size: 30px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            animation: pulse 1.5s infinite alternate;
        }
        audio {
            width: 100%;
            margin-top: 15px;
            border-radius: 30px;
        }
        .falling-icon {
            position: absolute;
            top: -50px;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 1;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-row">📢 🔥 ⏱️</div>
    <div class="img-wrapper">
        <img src="anh-tuong.jpg" alt="Ảnh Tường">
    </div>
    <h1>✨ Tường ơi, nấu cơm ăn đi nhé! 🍚🥢🍳</h1>
    <div class="icon-row">🍗 🍕 🍔 🍟</div>
    
    <!-- Thanh phát nhạc -->
    <audio id="myAudio" controls loop>
        <source src="nhac.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ nghe nhạc.
    </audio>
</div>

<script>
    // Tự động phát nhạc ngay khi người dùng chạm vào bất kỳ đâu trên màn hình
    const audio = document.getElementById('myAudio');
    function playMusic() {
        audio.play().catch(error => console.log("Chờ người dùng tương tác"));
    }
    document.addEventListener('click', playMusic);
    document.addEventListener('touchstart', playMusic);

    // Hiệu ứng mưa icon đồ ăn
    const icons = ['🍚', '🥢', '🍳', '🍗', '🍕', '🍔', '🍟', '🍜', '🍣', '🍲'];
    function createFallingIcon() {
        const icon = document.createElement('div');
        icon.classList.add('falling-icon');
        icon.innerText = icons[Math.floor(Math.random() * icons.length)];
        icon.style.left = Math.random() * 100 + 'vw';
        icon.style.animationDuration = Math.random() * 3 + 4 + 's';
        icon.style.opacity = Math.random() * 0.6 + 0.4;
        icon.style.fontSize = Math.random() * 15 + 20 + 'px';
        document.body.appendChild(icon);
        setTimeout(() => { icon.remove(); }, 7000);
    }
    setInterval(createFallingIcon, 400);
</script>

</body>
</html>
