<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Nhắc Gửi Tường</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }
        .img-wrapper {
            position: relative;
            max-width: 160px; 
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            aspect-ratio: 1 / 1;
        }
        img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }
        h1 {
            color: #ffb703;
            font-size: 24px;
            margin: 20px 0;
            line-height: 1.4;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 183, 3, 0.2);
        }
        .icon-row {
            font-size: 24px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 12px;
            opacity: 0.9;
        }
        audio {
            width: 100%;
            margin-top: 10px;
            border-radius: 30px;
            opacity: 0.8;
        }
        
        /* HIỆU ỨNG CHỮ BONG BÓNG BAY LÊN */
        .floating-text {
            position: absolute;
            bottom: -60px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            color: #ffffff;
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            animation: floatUp ease-in-out forwards;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.85;
            }
            90% {
                opacity: 0.85;
            }
            100% {
                transform: translateY(-110vh) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-row">✨ 🧸 🥰</div>
    
    <div class="img-wrapper">
        <img src="anh-tuong.jpg" alt="Ảnh Tường">
    </div>
    
    <h1>Tường ơi nhớ nhé ✨</h1>
    
    <div class="icon-row">❤️ 🌸 💞 💌</div>
    
    <!-- Đường dẫn nhạc đã được mã hóa khoảng trắng thành %20 để chạy mượt mà trên web -->
    <audio id="myAudio" controls loop>
        <source src="Cứ%20Vội%20Vàng.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ nghe nhạc.
    </audio>
</div>

<script>
    // Tự động phát nhạc khi tương tác màn hình
    const audio = document.getElementById('myAudio');
    function playMusic() {
        audio.play().catch(error => console.log("Chờ người dùng tương tác"));
    }
    document.addEventListener('click', playMusic);
    document.addEventListener('touchstart', playMusic);

    /* CÀI ĐẶT ĐÚNG 6 CÂU NHẮC NHỞ CỦA BẠN KÈM ICON HỢP LÝ */
    const reminders = [
        { text: "Tường đi đường cẩn thận nhé", icon: "🛵" },
        { text: "Đừng cáu gắt với Ngọc Linh nhó", icon: "🥺" },
        { text: "Yêu thương chính bản thân mình nhé", icon: "❤️" },
        { text: "Không được bỏ bữa nè", icon: "🍚" },
        { text: "Chơi thể thao nhiều hơn", icon: "⚽" },
        { text: "Không được buồn đâu nhé", icon: "☀️" }
    ];

    function createFloatingReminder() {
        const item = reminders[Math.floor(Math.random() * reminders.length)];
        
        const div = document.createElement('div');
        div.classList.add('floating-text');
        div.innerHTML = `<span>${item.text}</span> <span>${item.icon}</span>`;
        
        div.style.left = Math.random() * 70 + 8 + 'vw';
        div.style.animationDuration = Math.random() * 3 + 6 + 's';
        
        document.body.appendChild(div);
        
        setTimeout(() => { div.remove(); }, 9000);
    }
    
    setInterval(createFloatingReminder, 1600);
</script>

</body>
</html>
